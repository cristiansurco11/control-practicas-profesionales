{% extends "base.html" %}

{% block content %}

    <!-- BOTONES SUPERIORES -->
    <div class="mb-3">
        <a href="/base" class="btn btn-secondary">
            Volver al Inicio
        </a>

        <a href="/estudiantes/nuevo" class="btn btn-primary">
            Nuevo Estudiante
        </a>
    </div>

    <!-- TÍTULO -->
    <h1 class="text-center mb-4">Lista de Estudiantes</h1>

    <!-- CARD TABLA -->
    <div class="card shadow p-4">

        <table class="table table-bordered table-hover">

            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Carrera</th>
                    <th>Correo</th>
                    <th>Teléfono</th>
                    <th>Opciones</th>
                </tr>
            </thead>

            <tbody id="tabla-estudiantes"></tbody>

        </table>

    </div>
</div>

<script>

const token = localStorage.getItem('token');
const tabla = document.getElementById('tabla-estudiantes');


// 🔐 PROTECCIÓN (si no hay token, no entra)
if (!token) {
    tabla.innerHTML = `
        <tr>
            <td colspan="7" class="text-center text-danger fw-bold">
                Debe autenticarse primero
            </td>
        </tr>
    `;
} else {

    // 📥 LISTAR ESTUDIANTES
    fetch('http://localhost:5000/estudiantes', {
        method: 'GET',
        headers: {
            'Authorization': 'Bearer ' + token
        }
    })
    .then(response => response.json())
    .then(data => {

        tabla.innerHTML = '';

        data.forEach(estudiante => {
            tabla.innerHTML += `
                <tr>
                    <td>${estudiante.id_estudiante}</td>
                    <td>${estudiante.nombre}</td>
                    <td>${estudiante.apellido}</td>
                    <td>${estudiante.carrera}</td>
                    <td>${estudiante.correo}</td>
                    <td>${estudiante.telefono}</td>
                    <td>
                        <button class="btn btn-warning btn-sm"
                            onclick="window.location.href='/estudiantes/editar/${estudiante.id_estudiante}'">
                            Editar
                        </button>

                        <button class="btn btn-danger btn-sm"
                            onclick="eliminarEstudiante(${estudiante.id_estudiante})">
                            Eliminar
                        </button>
                    </td>
                </tr>
            `;
        });

    })
    .catch(error => console.error('Error:', error));
}


// 🗑️ ELIMINAR ESTUDIANTE
function eliminarEstudiante(id) {

    const confirmar = confirm("¿Está seguro de eliminar el estudiante?");
    if (!confirmar) return;

    const token = localStorage.getItem('token');

    fetch('http://localhost:5000/estudiantes/' + id, {
        method: 'DELETE',
        headers: {
            'Authorization': 'Bearer ' + token
        }
    })
    .then(res => res.json())
    .then(data => {
        alert(data.mensaje || "Eliminado correctamente");
        location.reload();
    })
    .catch(error => console.error(error));
}

</script>

{% endblock %}
