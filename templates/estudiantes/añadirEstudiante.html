<body class="bg-light">

<div class="container mt-5">

```
<div class="card shadow p-4">

    <h2 class="mb-4">Nuevo Estudiante</h2>

    <form id="formEstudiante">

        <label class="form-label">Nombre</label>
        <input type="text" name="nombre" class="form-control mb-3" required>

        <label class="form-label">Apellido</label>
        <input type="text" name="apellido" class="form-control mb-3" required>

        <label class="form-label">Carrera</label>
        <input type="text" name="carrera" class="form-control mb-3" required>

        <label class="form-label">Correo</label>
        <input type="email" name="correo" class="form-control mb-3" required>

        <label class="form-label">Teléfono</label>
        <input type="text" name="telefono" class="form-control mb-4">

        <button type="submit" class="btn btn-success">
            Guardar
        </button>

        <a href="/estudiantes/listar" class="btn btn-secondary">
            Volver
        </a>

    </form>

</div>
```

</div>

<script>

const token = localStorage.getItem("token");

if (!token) {
    alert("Debe iniciar sesión");
    window.location.href = "/login";
}

document.getElementById("formEstudiante")
.addEventListener("submit", function(e) {

    e.preventDefault();

    const data = {
        nombre: this.nombre.value,
        apellido: this.apellido.value,
        carrera: this.carrera.value,
        correo: this.correo.value,
        telefono: this.telefono.value
    };

    fetch("/estudiantes", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(data => {

        alert(data.mensaje || "Estudiante agregado correctamente");

        window.location.href = "/estudiantes/listar";

    })
    .catch(error => {

        console.error(error);
        alert("Error al guardar el estudiante");

    });

});

</script>

</body>
</html>
