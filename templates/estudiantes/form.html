<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Estudiante</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h2>Editar Estudiante</h2>

<div class="mb-3">

<label>Nombre</label>
<input type="text" id="nombre" class="form-control">

<label>Apellido</label>
<input type="text" id="apellido" class="form-control">

<label>Carrera</label>
<input type="text" id="carrera" class="form-control">

<label>Correo</label>
<input type="email" id="correo" class="form-control">

<label>Telefono</label>
<input type="text" id="telefono" class="form-control">

</div>

<button class="btn btn-primary" onclick="guardarCambios()">
Actualizar
</button>

<a href="/estudiantes/listar" class="btn btn-secondary">
Volver
</a>

</div>

</div>


<script>

const idEstudiante = {{ id }};
const token = localStorage.getItem("token");


if(!token){
    alert("Debe iniciar sesión");
    window.location.href="/login";
}


// cargar estudiante

fetch("/estudiantes/" + idEstudiante,{
    method:"GET",
    headers:{
        "Authorization":"Bearer " + token
    }
})
.then(res=>res.json())
.then(estudiante=>{

    document.getElementById("nombre").value = estudiante.nombre;
    document.getElementById("apellido").value = estudiante.apellido;
    document.getElementById("carrera").value = estudiante.carrera;
    document.getElementById("correo").value = estudiante.correo;
    document.getElementById("telefono").value = estudiante.telefono;

});


// actualizar

function guardarCambios(){

let datos={

    nombre:document.getElementById("nombre").value,
    apellido:document.getElementById("apellido").value,
    carrera:document.getElementById("carrera").value,
    correo:document.getElementById("correo").value,
    telefono:document.getElementById("telefono").value

};


fetch("/estudiantes/" + idEstudiante,{

    method:"PUT",

    headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + token
    },

    body:JSON.stringify(datos)

})
.then(res=>res.json())
.then(data=>{

    alert(data.mensaje);
    window.location.href="/estudiantes/listar";

});

}

</script>

</body>
</html>
