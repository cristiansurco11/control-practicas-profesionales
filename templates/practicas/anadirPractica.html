<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Añadir Práctica</title>

```
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
```

</head>

<body class="bg-light">

<div class="container mt-5">

```
<div class="card shadow p-4">

    <h2 class="mb-4">Nueva Práctica</h2>

    <form id="formPractica">

        <label class="form-label">ID Estudiante</label>
        <input type="number" name="id_estudiante" class="form-control mb-3" required>

        <label class="form-label">ID Institución</label>
        <input type="number" name="id_institucion" class="form-control mb-3" required>

        <label class="form-label">Fecha de Inicio</label>
        <input type="date" name="fecha_inicio" class="form-control mb-3" required>

        <label class="form-label">Horas</label>
        <input type="number" name="horas" class="form-control mb-3" required>

        <label class="form-label">Estado</label>
        <input type="text" name="estado" class="form-control mb-4" placeholder="Activa, Finalizada, Pendiente..." required>

        <button type="submit" class="btn btn-success">
            Guardar
        </button>

        <a href="/practicas/listar" class="btn btn-secondary">
            Volver
        </a>

    </form>

</div>
```

</div>

<script>

const token = localStorage.getItem("token");

if (!token) {
    alert("Debe iniciar sesión");
    window.location.href = "/login";
}

document.getElementById("formPractica")
.addEventListener("submit", function(e) {

    e.preventDefault();

    const data = {
        id_estudiante: this.id_estudiante.value,
        id_institucion: this.id_institucion.value,
        fecha_inicio: this.fecha_inicio.value,
        horas: this.horas.value,
        estado: this.estado.value
    };

    fetch("/practicas", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(data => {

        alert(data.mensaje || "Práctica agregada correctamente");

        window.location.href = "/practicas/listar";

    })
    .catch(error => {

        console.error(error);
        alert("Error al guardar la práctica");

    });

});

</script>

</body>
</html>
