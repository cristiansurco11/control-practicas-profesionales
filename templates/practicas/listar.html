
{% extends "base.html" %}

{% block content %}

    <!-- BOTONES SUPERIORES -->
    <div class="mb-3">
        <a href="/base" class="btn btn-secondary">
            Volver al Inicio
        </a>

        <a href="/practicas/nuevo" class="btn btn-primary">
            Nueva Practica
        </a>
    </div>

    <!-- TÍTULO -->
    <h1 class="text-center mb-4">Lista de Practicas</h1>

    <!-- CARD TABLA -->
    <div class="card shadow p-4">

        <table class="table table-bordered table-hover">

            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>ID Práctica</th>
                    <th>Descripción</th>
                    <th>Fecha</th>
                    <th>Opciones</th>
                </tr>
            </thead>

            <tbody id="tabla-observaciones"></tbody>

        </table>

    </div>
</div>

<script>

const token = localStorage.getItem('token');
const tabla = document.getElementById('tabla-observaciones');


// 🔐 PROTECCIÓN (sin token no entra)
if (!token) {

    tabla.innerHTML = `
        <tr>
            <td colspan="5" class="text-center text-danger fw-bold">
                Debe autenticarse primero
            </td>
        </tr>
    `;

} else {

    // 📥 LISTAR OBSERVACIONES
    fetch('http://localhost:5000/observaciones', {
        method: 'GET',
        headers: {
            'Authorization': 'Bearer ' + token
        }
    })
    .then(response => response.json())
    .then(data => {

        tabla.innerHTML = '';

        data.forEach(obs => {
            tabla.innerHTML += `
                <tr>
                    <td>${obs.id_observacion}</td>
                    <td>${obs.id_practica}</td>
                    <td>${obs.descripcion}</td>
                    <td>${obs.fecha}</td>
                    <td>
                        <button class="btn btn-warning btn-sm"
                            onclick="window.location.href='/observaciones/editar/${obs.id_observacion}'">
                            Editar
                        </button>

                        <button class="btn btn-danger btn-sm"
                            onclick="eliminarObservacion(${obs.id_observacion})">
                            Eliminar
                        </button>
                    </td>
                </tr>
            `;
        });

    })
    .catch(error => console.error('Error:', error));
}


// 🗑️ ELIMINAR OBSERVACIÓN
function eliminarObservacion(id) {

    const confirmar = confirm("¿Está seguro de eliminar la observación?");
    if (!confirmar) return;

    const token = localStorage.getItem('token');

    fetch('http://localhost:5000/observaciones/' + id, {
        method: 'DELETE',
        headers: {
            'Authorization': 'Bearer ' + token
        }
    })
    .then(res => res.json())
    .then(data => {
        alert(data.mensaje || "Eliminado correctamente");
        location.reload();
    })
    .catch(error => console.error(error));
}

</script>

{% endblock %}
