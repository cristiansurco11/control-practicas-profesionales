<!DOCTYPE html>
<html>
<head>
    <title>Formulario Practicas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">
<h2>Práctica</h2>

<form id="formPractica">

<input name="id_estudiante" class="form-control mb-2" placeholder="ID Estudiante">
<input name="id_institucion" class="form-control mb-2" placeholder="ID Institución">
<input name="fecha_inicio" type="date" class="form-control mb-2">
<input name="horas" class="form-control mb-2" placeholder="Horas">
<input name="estado" class="form-control mb-2" placeholder="Estado">

<button class="btn btn-success">Guardar</button>

</form>

<script>
document.getElementById("formPractica").addEventListener("submit", function(e){
    e.preventDefault();

    let data = {
        id_estudiante: this.id_estudiante.value,
        id_institucion: this.id_institucion.value,
        fecha_inicio: this.fecha_inicio.value,
        horas: this.horas.value,
        estado: this.estado.value
    };

    fetch("http://localhost:5000/practicas", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(() => {
        alert("Guardado");
        window.location.href = "/practicas/listar";
    });
});
</script>

</body>
</html>
