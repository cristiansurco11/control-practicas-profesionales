<!DOCTYPE html>
<html lang="es">

<head>

<title>Prácticas</title>

<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>


<body class="container mt-4">


<div class="card shadow p-4">


<h2 id="titulo">
Nueva Práctica
</h2>


<form id="formPractica">


<input id="id_estudiante"
class="form-control mb-2"
placeholder="ID Estudiante">


<input id="id_institucion"
class="form-control mb-2"
placeholder="ID Institución">


<input id="fecha_inicio"
type="date"
class="form-control mb-2">


<input id="horas"
class="form-control mb-2"
placeholder="Horas">


<input id="estado"
class="form-control mb-2"
placeholder="Estado">


<button class="btn btn-success">
Guardar
</button>


<a href="/practicas/listar"
class="btn btn-secondary">
Volver
</a>


</form>


</div>



<script>


const idPractica = {{ id_practica }};
const token = localStorage.getItem("token");



if(!token){

alert("Debe iniciar sesión");
window.location.href="/login";

}





// EDITAR

if(idPractica > 0){


document.getElementById("titulo").innerHTML =
"Editar Práctica";



fetch("/practicas/"+idPractica,{

method:"GET",

headers:{

"Authorization":"Bearer "+token

}

})

.then(res=>res.json())

.then(prac=>{


id_estudiante.value =
prac.id_estudiante;


id_institucion.value =
prac.id_institucion;


fecha_inicio.value =
prac.fecha_inicio;


horas.value =
prac.horas;


estado.value =
prac.estado;


});


}




document
.getElementById("formPractica")
.addEventListener("submit",function(e){


e.preventDefault();



let datos={


id_estudiante:id_estudiante.value,

id_institucion:id_institucion.value,

fecha_inicio:fecha_inicio.value,

horas:horas.value,

estado:estado.value


};





// NUEVO

if(idPractica == 0){


fetch("/practicas",{

method:"POST",

headers:{


"Content-Type":"application/json",

"Authorization":"Bearer "+token


},

body:JSON.stringify(datos)

})


.then(res=>res.json())

.then(data=>{


alert(data.mensaje || "Guardado");


window.location.href="/practicas/listar";


});


}






// EDITAR

else{


fetch("/practicas/"+idPractica,{

method:"PUT",

headers:{


"Content-Type":"application/json",

"Authorization":"Bearer "+token


},

body:JSON.stringify(datos)


})


.then(res=>res.json())

.then(data=>{


alert(data.mensaje || "Actualizado");


window.location.href="/practicas/listar";


});


}



});


</script>


</body>
</html>
