<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Añadir Institución</title>

```
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
```

</head>

<body class="bg-light">

<div class="container mt-5">

```
<div class="card shadow p-4">

    <h2 class="mb-4">Nueva Institución</h2>

    <form id="formInstitucion">

        <label class="form-label">Nombre</label>
        <input type="text" name="nombre" class="form-control mb-3" required>

        <label class="form-label">Dirección</label>
        <input type="text" name="direccion" class="form-control mb-3" required>

        <label class="form-label">Teléfono</label>
        <input type="text" name="telefono" class="form-control mb-3">

        <label class="form-label">Responsable</label>
        <input type="text" name="responsable" class="form-control mb-4" required>

        <button type="submit" class="btn btn-success">
            Guardar
        </button>

        <a href="/instituciones/listar" class="btn btn-secondary">
            Volver
        </a>

    </form>

</div>
```

</div>

<script>

const token = localStorage.getItem("token");

if (!token) {
    alert("Debe iniciar sesión");
    window.location.href = "/login";
}

document.getElementById("formInstitucion")
.addEventListener("submit", function(e) {

    e.preventDefault();

    const data = {
        nombre: this.nombre.value,
        direccion: this.direccion.value,
        telefono: this.telefono.value,
        responsable: this.responsable.value
    };

    fetch("/instituciones", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(data => {

        alert(data.mensaje || "Institución agregada correctamente");

        window.location.href = "/instituciones/listar";

    })
    .catch(error => {

        console.error(error);
        alert("Error al guardar la institución");

    });

});

</script>

</body>
</html>
