<!DOCTYPE html>
<html>
<head>
    <title>Formulario Institucuibes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">
<h2>Institución</h2>

<form id="formInstitucion">

<input name="nombre" class="form-control mb-2" placeholder="Nombre">
<input name="direccion" class="form-control mb-2" placeholder="Dirección">
<input name="telefono" class="form-control mb-2" placeholder="Teléfono">
<input name="responsable" class="form-control mb-2" placeholder="Responsable">

<button class="btn btn-success">Guardar</button>

</form>

<script>
document.getElementById("formInstitucion").addEventListener("submit", function(e){
    e.preventDefault();

    let data = {
        nombre: this.nombre.value,
        direccion: this.direccion.value,
        telefono: this.telefono.value,
        responsable: this.responsable.value
    };

    fetch("http://localhost:5000/instituciones", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(() => {
        alert("Guardado");
        window.location.href = "/instituciones/listar";
    });
});
</script>

</body>
</html>
