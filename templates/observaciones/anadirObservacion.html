<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Añadir Observación</title>

```
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
```

</head>

<body class="bg-light">

<div class="container mt-5">

```
<div class="card shadow p-4">

    <h2 class="mb-4">Nueva Observación</h2>

    <form id="formObservacion">

        <label class="form-label">ID Práctica</label>
        <input type="number" name="id_practica" class="form-control mb-3" required>

        <label class="form-label">Descripción</label>
        <textarea name="descripcion"
                  class="form-control mb-3"
                  rows="4"
                  required></textarea>

        <label class="form-label">Fecha</label>
        <input type="date" name="fecha" class="form-control mb-4" required>

        <button type="submit" class="btn btn-success">
            Guardar
        </button>

        <a href="/observaciones/listar" class="btn btn-secondary">
            Volver
        </a>

    </form>

</div>
```

</div>

<script>

const token = localStorage.getItem("token");

if (!token) {
    alert("Debe iniciar sesión");
    window.location.href = "/login";
}

document.getElementById("formObservacion")
.addEventListener("submit", function(e) {

    e.preventDefault();

    const data = {
        id_practica: this.id_practica.value,
        descripcion: this.descripcion.value,
        fecha: this.fecha.value
    };

    fetch("/observaciones", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(data => {

        alert(data.mensaje || "Observación agregada correctamente");

        window.location.href = "/observaciones/listar";

    })
    .catch(error => {

        console.error(error);
        alert("Error al guardar la observación");

    });

});

</script>

</body>
</html>
