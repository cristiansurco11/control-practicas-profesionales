<!DOCTYPE html>
<html lang="es">

<head>

<title>Observaciones</title>

<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>


<body class="container mt-4">


<div class="card shadow p-4">


<h2 id="titulo">
Nueva Observación
</h2>


<form id="formObs">


<input id="id_practica"
class="form-control mb-2"
placeholder="ID Práctica">


<textarea id="descripcion"
class="form-control mb-2"
placeholder="Descripción"></textarea>


<input id="fecha"
type="date"
class="form-control mb-2">



<button class="btn btn-success">
Guardar
</button>


<a href="/observaciones/listar"
class="btn btn-secondary">
Volver
</a>


</form>


</div>




<script>


const idObservacion = {{ id_observacion }};
const token = localStorage.getItem("token");



if(!token){

alert("Debe iniciar sesión");
window.location.href="/login";

}




// EDITAR

if(idObservacion > 0){


document.getElementById("titulo").innerHTML =
"Editar Observación";



fetch("/observaciones/"+idObservacion,{

method:"GET",

headers:{

"Authorization":"Bearer "+token

}

})

.then(res=>res.json())

.then(obs=>{


id_practica.value = obs.id_practica;
descripcion.value = obs.descripcion;
fecha.value = obs.fecha;


});


}




document
.getElementById("formObs")
.addEventListener("submit",function(e){


e.preventDefault();



let datos={


id_practica:id_practica.value,

descripcion:descripcion.value,

fecha:fecha.value


};




// NUEVO

if(idObservacion == 0){


fetch("/observaciones",{

method:"POST",

headers:{


"Content-Type":"application/json",

"Authorization":"Bearer "+token


},

body:JSON.stringify(datos)


})


.then(res=>res.json())

.then(data=>{


alert(data.mensaje || "Guardado");

window.location.href="/observaciones/listar";


});


}




// EDITAR

else{


fetch("/observaciones/"+idObservacion,{

method:"PUT",

headers:{


"Content-Type":"application/json",

"Authorization":"Bearer "+token


},

body:JSON.stringify(datos)


})


.then(res=>res.json())

.then(data=>{


alert(data.mensaje || "Actualizado");

window.location.href="/observaciones/listar";


});


}



});


</script>


</body>

</html>
