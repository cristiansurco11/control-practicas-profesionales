<!DOCTYPE html>
<html>
<head>
    <title>Formulario Observaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Observación</h2>

<form id="formObs">

<input name="id_practica" class="form-control mb-2" placeholder="ID Práctica">
<textarea name="descripcion" class="form-control mb-2" placeholder="Descripción"></textarea>
<input name="fecha" type="date" class="form-control mb-2">

<button class="btn btn-success">Guardar</button>

</form>

<script>
document.getElementById("formObs").addEventListener("submit", function(e){
    e.preventDefault();

    let data = {
        id_practica: this.id_practica.value,
        descripcion: this.descripcion.value,
        fecha: this.fecha.value
    };

    fetch("http://localhost:5000/observaciones", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(() => {
        alert("Guardado");
        window.location.href = "/observaciones/listar";
    });
});
</script>

</body>
</html>
