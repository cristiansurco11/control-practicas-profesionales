<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <title>Sistema Prácticas Profesionales</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .sidebar {
            height: 100vh;
            background: #212529;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 5px;
        }

        .sidebar a:hover {
            background: #343a40;
        }

        .content {
            padding: 30px;
        }

        .dashboard-container {
            max-width: 1000px;
            margin: auto;
        }

        .card-dashboard {
            height: 170px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>

</head>

<body>

<div class="container-fluid">

    <div class="row">

        <!-- MENU LATERAL -->
        <div class="col-md-2 sidebar">

            <h4 class="text-center">
                📚 Sistema
            </h4>

            <hr>

            <a href="/base">
                📊 Inicio
            </a>

            <a href="/estudiantes/listar">
                👨‍🎓 Estudiantes
            </a>

            <a href="/instituciones/listar">
                🏢 Instituciones
            </a>

            <a href="/practicas/listar">
                📋 Prácticas
            </a>

            <a href="/observaciones/listar">
                📝 Observaciones
            </a>

            <hr>

            <a href="#" onclick="cerrarSesion()">
                🚪 Salir
            </a>

        </div>


        <!-- CONTENIDO PRINCIPAL -->
        <div class="col-md-10 content">

            {% block content %}

            <!-- DASHBOARD INICIAL -->

            <div class="dashboard-container">

                <h1 class="text-center mb-5">
                    📊 Sistema de Prácticas Profesionales
                </h1>


                <div class="row justify-content-center text-center">


                    <div class="col-md-5 mb-4">

                        <div class="card bg-primary text-white shadow card-dashboard">

                            <div class="card-body">

                                <h4>
                                    👨‍🎓 Estudiantes
                                </h4>

                                <h1 id="estudiantes">
                                    0
                                </h1>

                            </div>

                        </div>

                    </div>



                    <div class="col-md-5 mb-4">

                        <div class="card bg-success text-white shadow card-dashboard">

                            <div class="card-body">

                                <h4>
                                    🏢 Instituciones
                                </h4>

                                <h1 id="instituciones">
                                    0
                                </h1>

                            </div>

                        </div>

                    </div>



                    <div class="col-md-5 mb-4">

                        <div class="card bg-warning text-dark shadow card-dashboard">

                            <div class="card-body">

                                <h4>
                                    📋 Prácticas
                                </h4>

                                <h1 id="practicas">
                                    0
                                </h1>

                            </div>

                        </div>

                    </div>



                    <div class="col-md-5 mb-4">

                        <div class="card bg-danger text-white shadow card-dashboard">

                            <div class="card-body">

                                <h4>
                                    📝 Observaciones
                                </h4>

                                <h1 id="observaciones">
                                    0
                                </h1>

                            </div>

                        </div>

                    </div>


                </div>

            </div>


            {% endblock %}

        </div>

    </div>

</div>


<script>

const token = localStorage.getItem("token");


// Validar sesión
if (!token) {
    window.location.href = "/login";
}


// Cerrar sesión
function cerrarSesion() {

    localStorage.removeItem("token");
    window.location.href = "/login";

}


// Cargar datos del dashboard
if (window.location.pathname === "/base") {

    fetch("http://localhost:5000/dashboard", {

        method: "GET",

        headers: {
            "Authorization": "Bearer " + token
        }

    })
    .then(response => response.json())
    .then(data => {

        document.getElementById("estudiantes").innerText =
            data.estudiantes;

        document.getElementById("instituciones").innerText =
            data.instituciones;

        document.getElementById("practicas").innerText =
            data.practicas;

        document.getElementById("observaciones").innerText =
            data.observaciones;

    })
    .catch(error => console.log(error));

}

</script>


</body>

</html>
